<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>System Offline - Alpha-Centauri</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&amp;family=Space+Grotesk:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary-fixed-dim": "#98cbff",
                        "on-primary-fixed": "#001d33",
                        "tertiary-container": "#2db263",
                        "primary-container": "#00a3ff",
                        "on-surface-variant": "#bec7d4",
                        "surface-dim": "#131313",
                        "surface-container-highest": "#353534",
                        "secondary-container": "#474746",
                        "on-primary": "#003354",
                        "surface-container-high": "#2a2a2a",
                        "surface-container-low": "#1c1b1b",
                        "tertiary-fixed-dim": "#61de8a",
                        "on-background": "#e5e2e1",
                        "on-tertiary-fixed-variant": "#005228",
                        "tertiary": "#61de8a",
                        "on-tertiary": "#00391a",
                        "on-secondary-fixed-variant": "#474746",
                        "outline-variant": "#3f4852",
                        "on-secondary-container": "#b7b5b4",
                        "on-error": "#690005",
                        "on-surface": "#e5e2e1",
                        "on-error-container": "#ffdad6",
                        "primary": "#98cbff",
                        "inverse-surface": "#e5e2e1",
                        "surface-variant": "#353534",
                        "secondary": "#c8c6c5",
                        "outline": "#88919d",
                        "on-primary-fixed-variant": "#004a77",
                        "on-secondary-fixed": "#1b1c1c",
                        "inverse-on-surface": "#313030",
                        "background": "#131313",
                        "primary-fixed": "#cfe5ff",
                        "inverse-primary": "#00629d",
                        "error-container": "#93000a",
                        "surface-container": "#201f1f",
                        "secondary-fixed": "#e4e2e1",
                        "tertiary-fixed": "#7efba4",
                        "on-tertiary-fixed": "#00210c",
                        "on-secondary": "#303030",
                        "on-tertiary-container": "#003d1c",
                        "on-primary-container": "#00375a",
                        "error": "#ffb4ab",
                        "surface-tint": "#98cbff",
                        "surface-container-lowest": "#0e0e0e",
                        "surface": "#131313",
                        "secondary-fixed-dim": "#c8c6c5",
                        "surface-bright": "#3a3939"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Inter", "sans-serif"],
                        "body": ["Inter", "sans-serif"],
                        "label": ["Space Grotesk", "monospace"]
                    }
                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface font-body h-screen flex flex-col items-center justify-center overflow-hidden antialiased">
<!-- Ambient Glow Background -->
<div class="absolute inset-0 pointer-events-none flex items-center justify-center opacity-20">
<div class="w-96 h-96 bg-primary rounded-full blur-[120px]"></div>
</div>
<!-- Main Content Canvas -->
<main class="relative z-10 flex flex-col items-center w-full px-6 text-center max-w-md mx-auto">
<!-- Status Indicator -->
<div class="mb-12 flex flex-col items-center gap-4">
<div class="w-16 h-16 rounded-full bg-surface-container-high border border-outline-variant/30 flex items-center justify-center shadow-[0_10px_30px_rgba(0,0,0,0.5)]">
<span class="material-symbols-outlined text-on-surface-variant text-3xl">power_settings_new</span>
</div>
<div>
<h1 class="font-headline text-3xl font-bold tracking-tight text-on-surface">System Offline</h1>
<p class="font-label text-sm text-on-surface-variant mt-2 tracking-wide uppercase">Relay connection standing by</p>
</div>
</div>
<!-- Primary Action -->
<button class="w-full max-w-xs group relative bg-gradient-to-b from-primary to-primary-container rounded-xl p-[1px] shadow-[0_20px_40px_rgba(0,0,0,0.4)] transition-all duration-300 hover:scale-[0.98] active:scale-95">
<div class="w-full bg-surface-container-lowest rounded-xl overflow-hidden">
<div class="w-full h-full bg-gradient-to-b from-primary/10 to-transparent py-4 px-6 flex items-center justify-center gap-3">
<span class="material-symbols-outlined text-primary text-xl group-hover:animate-pulse">rocket_launch</span>
<span class="font-headline font-semibold text-lg text-primary tracking-wide">Start System</span>
</div>
</div>
<!-- Ghost Border highlight -->
<div class="absolute top-0 inset-x-0 h-[1px] bg-white/20 rounded-t-xl"></div>
</button>
<!-- Diagnostics Panel -->
<div class="mt-16 w-full bg-surface-container-low rounded-xl p-5 shadow-[0_10px_30px_rgba(0,0,0,0.3)] border border-outline-variant/15 flex flex-col gap-3">
<div class="flex justify-between items-center py-2">
<span class="font-label text-xs text-on-surface-variant uppercase tracking-widest">Target IP</span>
<span class="font-label text-xs text-on-surface font-medium">192.168.1.104</span>
</div>
<div class="h-[1px] w-full bg-surface-container-high"></div>
<div class="flex justify-between items-center py-2">
<span class="font-label text-xs text-on-surface-variant uppercase tracking-widest">Tailscale</span>
<div class="flex items-center gap-2">
<div class="w-2 h-2 rounded-full bg-tertiary"></div>
<span class="font-label text-xs text-on-surface font-medium">Ready</span>
</div>
</div>
<div class="h-[1px] w-full bg-surface-container-high"></div>
<div class="flex justify-between items-center py-2">
<span class="font-label text-xs text-on-surface-variant uppercase tracking-widest">Protocol</span>
<span class="font-label text-xs text-on-surface font-medium">SSH / TCP</span>
</div>
</div>
</main>
</body></html>
